<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proto Diagram Docs {{VERSION}}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: system-ui, -apple-system, sans-serif;
  background: #171A1C;
  color: #E3E6E8;
}

/* ── Header ────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 48px;
  padding: 0 16px;
  background: #0B0D0E;
  border-bottom: 1px solid #2F3639;
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.hamburger {
  background: none;
  border: none;
  color: #ABB5BA;
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  line-height: 1;
}
.hamburger:hover { color: #E3E6E8; background: #22282A; }

.header-title {
  font-size: 15px;
  font-weight: 600;
  color: #E3E6E8;
  white-space: nowrap;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.version-badge {
  font-size: 11px;
  color: #73848C;
  background: #22282A;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid #2F3639;
}

.github-link {
  color: #ABB5BA;
  text-decoration: none;
  display: flex;
  align-items: center;
}
.github-link:hover { color: #E3E6E8; }
.github-link svg { width: 20px; height: 20px; fill: currentColor; }

/* ── Main layout ───────────────────────────────────────── */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ── Catalog ───────────────────────────────────────────── */
.catalog {
  width: 320px;
  min-width: 320px;
  background: #171A1C;
  border-right: 1px solid #2F3639;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.catalog.hidden { display: none; }

.search-box {
  padding: 12px;
  border-bottom: 1px solid #2F3639;
  flex-shrink: 0;
}

.search-input {
  width: 100%;
  padding: 8px 12px;
  background: #22282A;
  border: 1px solid #394246;
  border-radius: 6px;
  color: #E3E6E8;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
.search-input::placeholder { color: #73848C; }
.search-input:focus { border-color: #33CC66; }

.catalog-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.catalog-list::-webkit-scrollbar { width: 6px; }
.catalog-list::-webkit-scrollbar-track { background: transparent; }
.catalog-list::-webkit-scrollbar-thumb { background: #394246; border-radius: 3px; }
.catalog-list::-webkit-scrollbar-thumb:hover { background: #4a5568; }

.group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  cursor: pointer;
  user-select: none;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #73848C;
}
.group-header:hover { color: #ABB5BA; }

.group-chevron {
  transition: transform 0.15s ease;
  font-size: 10px;
}
.group-header.collapsed .group-chevron { transform: rotate(-90deg); }

.group-count {
  font-size: 10px;
  background: #22282A;
  color: #73848C;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 8px;
}

.group-entries { padding: 0; }
.group-entries.collapsed { display: none; }

.proto-entry {
  display: flex;
  flex-direction: column;
  padding: 8px 16px 8px 20px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.1s ease;
}
.proto-entry:hover { background: #22282A; }
.proto-entry.active {
  border-left-color: #33CC66;
  background: #22282A;
}

.proto-name {
  font-size: 13px;
  font-weight: 500;
  color: #E3E6E8;
  display: flex;
  align-items: center;
  gap: 6px;
}

.proto-package {
  font-size: 11px;
  font-family: monospace;
  color: #73848C;
  margin-top: 2px;
}

.proto-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  flex-wrap: wrap;
}

.type-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 500;
}
.type-badge.file { background: rgba(51,204,102,0.15); color: #33CC66; }
.type-badge.deps { background: rgba(91,103,227,0.15); color: #5B67E3; }
.type-badge.pkg  { background: rgba(255,157,0,0.15);  color: #FF9D00; }

.source-link {
  font-size: 11px;
  color: #5B67E3;
  text-decoration: none;
  margin-left: auto;
}
.source-link:hover { text-decoration: underline; }

.catalog-empty {
  padding: 24px 16px;
  text-align: center;
  color: #73848C;
  font-size: 13px;
}

/* ── Viewer ────────────────────────────────────────────── */
.viewer {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: #0B0D0E;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  height: 44px;
  background: #171A1C;
  border-bottom: 1px solid #2F3639;
  flex-shrink: 0;
}

.toolbar-name {
  font-size: 13px;
  font-weight: 500;
  color: #E3E6E8;
  margin-right: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.toolbar-tabs {
  display: flex;
  gap: 4px;
  margin-right: auto;
}

.tab-btn {
  background: none;
  border: 1px solid #394246;
  color: #ABB5BA;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  text-transform: uppercase;
  font-weight: 500;
}
.tab-btn:hover { color: #E3E6E8; border-color: #ABB5BA; }
.tab-btn.active {
  background: rgba(51,204,102,0.15);
  color: #33CC66;
  border-color: #33CC66;
}

.zoom-controls {
  display: flex;
  gap: 4px;
}

.zoom-btn {
  background: #22282A;
  border: 1px solid #394246;
  color: #ABB5BA;
  font-size: 13px;
  width: 32px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
}
.zoom-btn:hover { color: #E3E6E8; border-color: #ABB5BA; }

.viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
  cursor: grab;
}
.viewport.dragging { cursor: grabbing; }

.svg-container {
  transform-origin: 0 0;
  position: absolute;
  top: 0;
  left: 0;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #73848C;
  gap: 8px;
}
.empty-state-icon { font-size: 48px; opacity: 0.3; }
.empty-state-text { font-size: 14px; }

.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #73848C;
  font-size: 14px;
}

.error-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #E51A1A;
  gap: 8px;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <button class="hamburger" aria-label="Toggle catalog">&#9776;</button>
      <span class="header-title">Proto Diagram Docs</span>
    </div>
    <div class="header-right">
      <span class="version-badge">{{VERSION}}</span>
      <a class="github-link" href="{{GITHUB_URL}}" target="_blank" rel="noopener" aria-label="GitHub">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
    </div>
  </div>

  <div class="main">
    <div class="catalog" id="catalog">
      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="Search protos...">
      </div>
      <div class="catalog-list" id="catalogList"></div>
    </div>

    <div class="viewer">
      <div class="toolbar" id="toolbar">
        <span class="toolbar-name" id="toolbarName"></span>
        <div class="toolbar-tabs" id="toolbarTabs"></div>
        <div class="zoom-controls">
          <button class="zoom-btn zoom-in" title="Zoom in">+</button>
          <button class="zoom-btn zoom-out" title="Zoom out">&minus;</button>
          <button class="zoom-btn zoom-fit" title="Fit to view">FIT</button>
          <button class="zoom-btn zoom-reset" title="Reset zoom">1:1</button>
        </div>
      </div>
      <div class="viewport" id="viewport">
        <div class="svg-container" id="svgContainer"></div>
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">&#9634;</div>
          <div class="empty-state-text">Select a proto to view its diagram</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var searchIndex = [];
  var currentId = null;
  var currentType = null;
  var scale = 1;
  var translateX = 0;
  var translateY = 0;

  var catalog = document.getElementById('catalog');
  var catalogList = document.getElementById('catalogList');
  var searchInput = document.getElementById('searchInput');
  var viewport = document.getElementById('viewport');
  var svgContainer = document.getElementById('svgContainer');
  var emptyState = document.getElementById('emptyState');
  var toolbarName = document.getElementById('toolbarName');
  var toolbarTabs = document.getElementById('toolbarTabs');

  // ── Hamburger toggle ──────────────────────────────────
  document.querySelector('.hamburger').addEventListener('click', function () {
    catalog.classList.toggle('hidden');
  });

  // ── Data loading ───────────────────────────────────────
  function loadSearchIndex() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'search-index.json', true);
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        if (xhr.status === 200 || xhr.status === 0) {
          try {
            searchIndex = JSON.parse(xhr.responseText);
          } catch (e) {
            searchIndex = [];
          }
        }
        renderCatalog(searchIndex);
        handleHashChange();
      }
    };
    xhr.send();
  }

  // ── Catalog rendering ──────────────────────────────────
  function renderCatalog(entries) {
    catalogList.innerHTML = '';

    if (!entries || entries.length === 0) {
      catalogList.innerHTML = '<div class="catalog-empty">No results</div>';
      return;
    }

    var fileEntries = [];
    var packageEntries = [];
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].type === 'package') {
        packageEntries.push(entries[i]);
      } else {
        fileEntries.push(entries[i]);
      }
    }

    var groups = {};
    var groupOrder = [];
    for (var i = 0; i < fileEntries.length; i++) {
      var label = fileEntries[i].label || 'Ungrouped';
      if (!groups[label]) {
        groups[label] = [];
        groupOrder.push(label);
      }
      groups[label].push(fileEntries[i]);
    }

    for (var g = 0; g < groupOrder.length; g++) {
      var label = groupOrder[g];
      var items = groups[label];
      renderGroup(label, items);
    }

    if (packageEntries.length > 0) {
      renderGroup('Packages', packageEntries);
    }
  }

  function renderGroup(label, items) {
    var header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML =
      '<span><span class="group-chevron">&#9660;</span> ' +
      escapeHtml(label) +
      '</span><span class="group-count">' + items.length + '</span>';

    var entriesDiv = document.createElement('div');
    entriesDiv.className = 'group-entries';

    header.addEventListener('click', function () {
      header.classList.toggle('collapsed');
      entriesDiv.classList.toggle('collapsed');
    });

    for (var i = 0; i < items.length; i++) {
      entriesDiv.appendChild(createEntry(items[i]));
    }

    catalogList.appendChild(header);
    catalogList.appendChild(entriesDiv);
  }

  function createEntry(item) {
    var div = document.createElement('div');
    div.className = 'proto-entry';
    div.setAttribute('data-id', item.id);

    if (item.id === currentId) {
      div.classList.add('active');
    }

    var nameHtml = '<div class="proto-name">' + escapeHtml(item.name) + '</div>';
    var packageHtml = item.package
      ? '<div class="proto-package">' + escapeHtml(item.package) + '</div>'
      : '';

    var badgesHtml = '';
    if (item.diagramTypes && item.diagramTypes.length > 0) {
      for (var t = 0; t < item.diagramTypes.length; t++) {
        badgesHtml += '<span class="type-badge ' + item.diagramTypes[t] + '">' +
          item.diagramTypes[t] + '</span>';
      }
    }

    var sourceHtml = '';
    if (item.path && item.sourceUrl) {
      sourceHtml = '<a class="source-link" href="' + escapeHtml(item.sourceUrl) +
        '" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#8599; source</a>';
    }

    var metaHtml = (badgesHtml || sourceHtml)
      ? '<div class="proto-meta">' + badgesHtml + sourceHtml + '</div>'
      : '';

    div.innerHTML = nameHtml + packageHtml + metaHtml;

    var defaultType = (item.diagramTypes && item.diagramTypes.length > 0)
      ? item.diagramTypes[0]
      : 'file';

    div.addEventListener('click', function () {
      var type = (currentId === item.id && currentType) ? currentType : defaultType;
      location.hash = '#/' + item.id + '/' + type;
    });

    return div;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;')
              .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Search ─────────────────────────────────────────────
  searchInput.addEventListener('input', function () {
    var query = searchInput.value.trim().toLowerCase();
    if (!query) {
      renderCatalog(searchIndex);
      return;
    }

    var filtered = [];
    for (var i = 0; i < searchIndex.length; i++) {
      var entry = searchIndex[i];
      if (matchEntry(entry, query)) {
        filtered.push(entry);
      }
    }
    renderCatalog(filtered);
  });

  function matchEntry(entry, query) {
    if (contains(entry.name, query)) return true;
    if (contains(entry.package, query)) return true;
    if (contains(entry.label, query)) return true;
    if (contains(entry.path, query)) return true;
    if (matchArray(entry.messages, query)) return true;
    if (matchArray(entry.services, query)) return true;
    if (matchArray(entry.enums, query)) return true;
    return false;
  }

  function contains(str, query) {
    return str && str.toLowerCase().indexOf(query) !== -1;
  }

  function matchArray(arr, query) {
    if (!arr) return false;
    for (var i = 0; i < arr.length; i++) {
      if (arr[i].toLowerCase().indexOf(query) !== -1) return true;
    }
    return false;
  }

  // ── Hash routing ───────────────────────────────────────
  function parseHash() {
    var hash = location.hash.slice(2);
    var parts = hash.split('/');
    return { id: parts[0] || null, type: parts[1] || null };
  }

  function handleHashChange() {
    var parsed = parseHash();
    if (!parsed.id) {
      currentId = null;
      currentType = null;
      showEmptyState();
      updateActiveEntry();
      toolbarName.textContent = '';
      toolbarTabs.innerHTML = '';
      return;
    }

    currentId = parsed.id;
    currentType = parsed.type;

    var entry = findEntry(parsed.id);
    if (entry) {
      toolbarName.textContent = entry.name;
      renderTabs(entry);
      if (!parsed.type && entry.diagramTypes && entry.diagramTypes.length > 0) {
        currentType = entry.diagramTypes[0];
        location.hash = '#/' + parsed.id + '/' + currentType;
        return;
      }
    }

    updateActiveEntry();
    loadDiagram(parsed.id, parsed.type);
  }

  function findEntry(id) {
    for (var i = 0; i < searchIndex.length; i++) {
      if (searchIndex[i].id === id) return searchIndex[i];
    }
    return null;
  }

  window.addEventListener('hashchange', handleHashChange);

  // ── Toolbar tabs ───────────────────────────────────────
  function renderTabs(entry) {
    toolbarTabs.innerHTML = '';
    if (!entry.diagramTypes || entry.diagramTypes.length <= 1) return;

    for (var i = 0; i < entry.diagramTypes.length; i++) {
      var btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.textContent = entry.diagramTypes[i];
      if (entry.diagramTypes[i] === currentType) {
        btn.classList.add('active');
      }
      btn.setAttribute('data-type', entry.diagramTypes[i]);
      btn.addEventListener('click', (function (type) {
        return function () {
          location.hash = '#/' + currentId + '/' + type;
        };
      })(entry.diagramTypes[i]));
      toolbarTabs.appendChild(btn);
    }
  }

  // ── Active entry highlight ─────────────────────────────
  function updateActiveEntry() {
    var all = catalogList.querySelectorAll('.proto-entry');
    for (var i = 0; i < all.length; i++) {
      if (all[i].getAttribute('data-id') === currentId) {
        all[i].classList.add('active');
      } else {
        all[i].classList.remove('active');
      }
    }
  }

  // ── SVG loading ────────────────────────────────────────
  function showEmptyState() {
    emptyState.style.display = '';
    svgContainer.innerHTML = '';
    svgContainer.style.transform = '';
  }

  function loadDiagram(id, type) {
    emptyState.style.display = 'none';
    svgContainer.innerHTML = '<div class="loading-state">Loading diagram\u2026</div>';

    var url = 'diagrams/' + id + '-' + type + '.svg';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        if (xhr.status === 200 || xhr.status === 0) {
          if (xhr.responseText && xhr.responseText.indexOf('<svg') !== -1) {
            svgContainer.innerHTML = xhr.responseText;
            resetTransform();
          } else {
            showError('Diagram not found');
          }
        } else {
          showError('Failed to load diagram (HTTP ' + xhr.status + ')');
        }
      }
    };
    xhr.onerror = function () {
      showError('Network error loading diagram');
    };
    xhr.send();
  }

  function showError(msg) {
    svgContainer.innerHTML =
      '<div class="error-state">' +
      '<div>\u26A0</div>' +
      '<div>' + escapeHtml(msg) + '</div>' +
      '</div>';
  }

  // ── Pan & Zoom ─────────────────────────────────────────
  function resetTransform() {
    scale = 1;
    translateX = 0;
    translateY = 0;
    applyTransform();
  }

  function applyTransform() {
    svgContainer.style.transform =
      'translate(' + translateX + 'px, ' + translateY + 'px) scale(' + scale + ')';
  }

  // Mouse drag panning
  var isDragging = false;
  var dragStartX = 0;
  var dragStartY = 0;
  var dragStartTX = 0;
  var dragStartTY = 0;

  viewport.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return;
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragStartTX = translateX;
    dragStartTY = translateY;
    viewport.classList.add('dragging');
    e.preventDefault();
  });

  document.addEventListener('mousemove', function (e) {
    if (!isDragging) return;
    translateX = dragStartTX + (e.clientX - dragStartX);
    translateY = dragStartTY + (e.clientY - dragStartY);
    applyTransform();
  });

  document.addEventListener('mouseup', function () {
    isDragging = false;
    viewport.classList.remove('dragging');
  });

  // Wheel zoom
  viewport.addEventListener('wheel', function (e) {
    e.preventDefault();
    var rect = viewport.getBoundingClientRect();
    var mouseX = e.clientX - rect.left;
    var mouseY = e.clientY - rect.top;

    var prevScale = scale;
    if (e.deltaY < 0) {
      scale *= 1.1;
    } else {
      scale /= 1.1;
    }
    scale = Math.max(0.1, Math.min(10, scale));

    var ratio = scale / prevScale;
    translateX = mouseX - ratio * (mouseX - translateX);
    translateY = mouseY - ratio * (mouseY - translateY);

    applyTransform();
  }, { passive: false });

  // Zoom buttons
  document.querySelector('.zoom-in').addEventListener('click', function () {
    scale *= 1.2;
    scale = Math.min(10, scale);
    applyTransform();
  });

  document.querySelector('.zoom-out').addEventListener('click', function () {
    scale /= 1.2;
    scale = Math.max(0.1, scale);
    applyTransform();
  });

  document.querySelector('.zoom-fit').addEventListener('click', function () {
    var svg = svgContainer.querySelector('svg');
    if (!svg) return;

    var vw = viewport.clientWidth;
    var vh = viewport.clientHeight;
    var svgW = svg.getBoundingClientRect().width / scale;
    var svgH = svg.getBoundingClientRect().height / scale;

    if (svgW === 0 || svgH === 0) return;

    var fitScale = Math.min(vw / svgW, vh / svgH) * 0.95;
    scale = Math.max(0.1, Math.min(10, fitScale));
    translateX = (vw - svgW * scale) / 2;
    translateY = (vh - svgH * scale) / 2;
    applyTransform();
  });

  document.querySelector('.zoom-reset').addEventListener('click', function () {
    scale = 1;
    translateX = 0;
    translateY = 0;
    applyTransform();
  });

  // ── Init ───────────────────────────────────────────────
